<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polygon Explorer</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c26;
      --surface2: #1f2435;
      --border: #2a2f42;
      --accent: #4ade80;
      --accent2: #22d3ee;
      --text: #e8eaf0;
      --text-muted: #7a8099;
      --text-dim: #4a5070;
      --danger: #f87171;
      --radius: 10px;
      --font-mono: 'DM Mono', monospace;
      --font-sans: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      flex-shrink: 0;
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .header-hint {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    /* ── MAP ── */
    #map {
      width: 100%;
      height: 520px;
      border-bottom: 1px solid var(--border);
    }

    /* Leaflet overrides */
    .leaflet-container { background: #1a1a2e; }
    .leaflet-control-zoom a {
      background: var(--surface2) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--border) !important; }
    .leaflet-control-attribution {
      background: rgba(15,17,23,0.75) !important;
      color: var(--text-dim) !important;
      font-size: 10px;
    }
    .leaflet-control-attribution a { color: var(--text-dim) !important; }

    /* Custom polygon tooltip */
    .poly-tooltip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    /* ── MAIN CONTENT ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* ── PROMPT STATE ── */
    #prompt-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 48px 0;
      color: var(--text-dim);
    }

    .prompt-icon {
      width: 44px; height: 44px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    #prompt-state p {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* ── POLYGON INFO HEADER ── */
    #poly-header {
      display: none;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    #poly-header.visible { display: flex; }

    #poly-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .poly-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #ffffff;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      text-shadow:
        0 0 4px #000,
        0 0 8px #000,
        1px 1px 2px #000,
        -1px -1px 2px #000;
      pointer-events: none;
      white-space: nowrap;
    }

.poly-label::before { display: none; }
    
    #poly-id-display {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
    }

    /* ── SECTION TITLES ── */
    .section-title {
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── TABLES ── */
    .tables-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    @media (max-width: 720px) {
      .tables-grid { grid-template-columns: 1fr; }
    }

    .table-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-block-header {
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }

    thead th {
      padding: 8px 12px;
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody td {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(42,47,66,0.5);
      color: var(--text);
      word-break: break-word;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover td { background: var(--surface2); }

    .no-data {
      padding: 20px 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── COMMENTS ── */
    #comments-section { margin-top: 4px; }

    .comment-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-row input, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .form-row input:focus, textarea:focus {
      border-color: var(--accent2);
    }

    .form-row input {
      max-width: 200px;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
      margin-bottom: 10px;
    }

    .submit-btn {
      background: var(--accent);
      color: #0a1a0f;
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }

    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.97); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .form-status {
      font-family: var(--font-mono);
      font-size: 11px;
      margin-top: 8px;
      min-height: 16px;
    }

    .form-status.success { color: var(--accent); }
    .form-status.error { color: var(--danger); }

    /* ── COMMENT LIST ── */
    .comments-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .comment-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .comment-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .comment-author {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--accent2);
    }

    .comment-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .comment-body {
      font-size: 13px;
      color: var(--text);
      line-height: 1.55;
    }

    .no-comments {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 24px 0;
    }

    /* ── LOADING SPINNER ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>Polygon Explorer</h1>
  <span class="header-hint">click a polygon to explore</span>
</header>

<div id="map"></div>

<main>
  <!-- Prompt before any polygon is selected -->
  <div id="prompt-state">
    <div class="prompt-icon">⬡</div>
    <p>Select a polygon on the map to view its data and comments.</p>
  </div>

  <!-- Polygon info (hidden until click) -->
  <div id="poly-content" class="hidden">

    <div id="poly-header">
      <span id="poly-label">poly_id</span>
      <span id="poly-id-display">—</span>
    </div>

    <p class="section-title">Site information</p>
    <div class="tables-grid">
      <div class="table-block">
        <div class="table-block-header">Table 1 — Sites</div>
        <div class="table-scroll">
          <div id="table1-content"><div class="no-data">No data</div></div>
        </div>
      </div>
      <div class="table-block">
        <div class="table-block-header">Table 2 — Species</div>
        <div class="table-scroll">
          <div id="table2-content"><div class="no-data">No data</div></div>
        </div>
      </div>
    </div>

    <div id="comments-section">
      <p class="section-title">Comments</p>

      <div class="comment-form">
        <div class="form-row">
          <input type="text" id="input-name" placeholder="Your name" maxlength="60" />
        </div>
        <textarea id="input-comment" placeholder="Leave a comment about this polygon…" maxlength="1000"></textarea>
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <button class="submit-btn" id="submit-btn" onclick="submitComment()">Post comment</button>
          <span class="form-status" id="form-status"></span>
        </div>
      </div>

      <div id="comments-list" class="comments-list">
        <div class="no-comments">Loading comments…</div>
      </div>
    </div>

  </div>
</main>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://gywchkplaisgdmdvpgxl.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5d2Noa3BsYWlzZ2RtZHZwZ3hsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDU1MjAsImV4cCI6MjA5MDAyMTUyMH0.IHYosp7zTubQSA_DknXKlY8qqHY3oldcsfhHHU9Oqe8';

  // !! IMPORTANT: Update these paths to match your actual filenames on GitHub
  const GEOJSON_URL = 'polygons.geojson';
  const TABLE1_URL  = 'table1.csv';
  const TABLE2_URL  = 'table2.csv';

  // Table 1 columns to display (in order), excluding poly_id
  const TABLE1_COLS = ['Source', 'siteCode', 'User_site_ID', 'Site_name_english', 'Country'];
  // Table 2 columns to display (in order), excluding poly_id
  const TABLE2_COLS = ['Source', 'ScientificName', 'CommonName', 'Season-WDKBA', 'Max_Year_SiteEsts', 'Best_Site_MI'];

  // ── INIT ────────────────────────────────────────────────────
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let table1Data = [];
  let table2Data = [];
  let activePolyId = null;
  let activeLayer = null;

  const defaultStyle = {
    color: '#ffffff',
    weight: 1.2,
    opacity: 0.8,
    fillColor: '#ffffff',
    fillOpacity: 0.08
  };

  const hoverStyle = {
    color: '#4ade80',
    weight: 2,
    opacity: 1,
    fillColor: '#4ade80',
    fillOpacity: 0.22
  };

  const activeStyle = {
    color: '#4ade80',
    weight: 2.5,
    opacity: 1,
    fillColor: '#4ade80',
    fillOpacity: 0.3
  };

  // ── MAP ─────────────────────────────────────────────────────
  const map = L.map('map', {
    center: [20, 0],
    zoom: 2,
    zoomControl: true,
    attributionControl: true
  });

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© <a href="https://www.esri.com/">Esri</a>, Maxar, Earthstar Geographics',
  maxZoom: 19
}).addTo(map);

  // ── LOAD CSV DATA ───────────────────────────────────────────
  async function loadCSV(url) {
    return new Promise((resolve, reject) => {
      Papa.parse(url, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: r => resolve(r.data),
        error: e => reject(e)
      });
    });
  }

  // ── LOAD GEOJSON ────────────────────────────────────────────
  async function loadGeoJSON() {
    const res = await fetch(GEOJSON_URL);
    if (!res.ok) throw new Error('Could not load GeoJSON: ' + res.status);
    return res.json();
  }

  // ── RENDER TABLE ────────────────────────────────────────────
  function renderTable(containerId, rows, cols) {
    const el = document.getElementById(containerId);
    if (!rows || rows.length === 0) {
      el.innerHTML = '<div class="no-data">No matching rows for this polygon.</div>';
      return;
    }
    let html = '<table><thead><tr>';
    cols.forEach(c => { html += `<th>${c}</th>`; });
    html += '</tr></thead><tbody>';
    rows.forEach(row => {
      html += '<tr>';
      cols.forEach(c => { html += `<td>${row[c] ?? '—'}</td>`; });
      html += '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  // ── RENDER COMMENTS ─────────────────────────────────────────
  function renderComments(comments) {
    const el = document.getElementById('comments-list');
    if (!comments || comments.length === 0) {
      el.innerHTML = '<div class="no-comments">No comments yet. Be the first!</div>';
      return;
    }
    el.innerHTML = comments.map(c => {
      const date = new Date(c.created_at);
      const timeStr = date.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
                    + ' · ' + date.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      return `
        <div class="comment-card">
          <div class="comment-meta">
            <span class="comment-author">${escHtml(c.author)}</span>
            <span class="comment-time">${timeStr}</span>
          </div>
          <div class="comment-body">${escHtml(c.comment)}</div>
        </div>`;
    }).join('');
  }

  // ── LOAD COMMENTS FOR POLY ──────────────────────────────────
  async function loadComments(polyId) {
    document.getElementById('comments-list').innerHTML =
      '<div class="no-comments"><span class="spinner"></span>Loading…</div>';
    const { data, error } = await sb
      .from('comments')
      .select('*')
      .eq('poly_id', polyId)
      .order('created_at', { ascending: false });
    if (error) {
      document.getElementById('comments-list').innerHTML =
        '<div class="no-comments">Could not load comments.</div>';
      return;
    }
    renderComments(data);
  }

  // ── SELECT POLYGON ──────────────────────────────────────────
  function selectPolygon(polyId, layer) {
    // Reset previous active layer
    if (activeLayer && activeLayer !== layer) {
      activeLayer.setStyle(defaultStyle);
    }

    activePolyId = polyId;
    activeLayer = layer;
    layer.setStyle(activeStyle);

    // Show content panel
    document.getElementById('prompt-state').classList.add('hidden');
    document.getElementById('poly-content').classList.remove('hidden');
    document.getElementById('poly-header').classList.add('visible');
    document.getElementById('poly-id-display').textContent = polyId;

    // Filter tables
    const rows1 = table1Data.filter(r => String(r.poly_id) === String(polyId));
    const rows2 = table2Data.filter(r => String(r.poly_id) === String(polyId));
    renderTable('table1-content', rows1, TABLE1_COLS);
    renderTable('table2-content', rows2, TABLE2_COLS);

    // Load comments
    loadComments(polyId);

    // Reset form
    document.getElementById('form-status').textContent = '';
    document.getElementById('form-status').className = 'form-status';

    // Scroll to content
    setTimeout(() => {
      document.querySelector('main').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  // ── SUBMIT COMMENT ──────────────────────────────────────────
  async function submitComment() {
    const name    = document.getElementById('input-name').value.trim();
    const comment = document.getElementById('input-comment').value.trim();
    const status  = document.getElementById('form-status');
    const btn     = document.getElementById('submit-btn');

    if (!name) {
      status.textContent = 'Please enter your name.';
      status.className = 'form-status error';
      return;
    }
    if (!comment) {
      status.textContent = 'Please enter a comment.';
      status.className = 'form-status error';
      return;
    }
    if (!activePolyId) return;

    btn.disabled = true;
    status.textContent = '';

    const { error } = await sb.from('comments').insert({
      poly_id: activePolyId,
      author: name,
      comment: comment
    });

    btn.disabled = false;

    if (error) {
      status.textContent = 'Error posting comment. Please try again.';
      status.className = 'form-status error';
      return;
    }

    status.textContent = 'Comment posted!';
    status.className = 'form-status success';
    document.getElementById('input-comment').value = '';

    // Reload comments
    loadComments(activePolyId);
  }

  // ── HELPERS ─────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── BOOTSTRAP ───────────────────────────────────────────────
  (async () => {
    try {
      [table1Data, table2Data] = await Promise.all([loadCSV(TABLE1_URL), loadCSV(TABLE2_URL)]);
    } catch(e) {
      console.warn('Could not load CSV files:', e);
    }

    try {
      const geojson = await loadGeoJSON();
      const geoLayer = L.geoJSON(geojson, {
        style: defaultStyle,
        onEachFeature(feature, layer) {
          const polyId = feature.properties?.poly_id ?? feature.properties?.POLY_ID;

          layer.bindTooltip(
            String(polyId),
            {
              permanent: true,
              direction: 'center',
              className: 'poly-label'
            }
          );

          layer.on('mouseover', function() {
            if (this !== activeLayer) this.setStyle(hoverStyle);
          });
          layer.on('mouseout', function() {
            if (this !== activeLayer) this.setStyle(defaultStyle);
          });
          layer.on('click', function() {
            selectPolygon(polyId, this);
          });
        }
      }).addTo(map);

      if (geoLayer.getBounds().isValid()) {
        map.fitBounds(geoLayer.getBounds(), { padding: [20, 20] });
      }
    } catch(e) {
      console.error('Could not load GeoJSON:', e);
    }
  })();

  // Allow pressing Enter in name field to move to comment box
  document.getElementById('input-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('input-comment').focus();
  });
</script>
</body>
</html>
